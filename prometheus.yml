global:
  scrape_interval: 15s   # интервал, с которым Prometheus ходит за метриками

scrape_configs:
  - job_name: 'node'     # имя джоба. Метрики будут помечены {job="node"}
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']   # сам Prometheus мониторит себя